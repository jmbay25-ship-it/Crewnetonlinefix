<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>CrewNet GPS Fixed</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#061226;
  color:#fff;
}

.productionMap{
  position:relative;
  width:100%;
  height:100vh;
  background:#0b1a33;
}

.vesselPopup{
  position:absolute;
  transform:translate(-50%,-120%);
  background:rgba(4,15,33,0.9);
  border:1px solid rgba(95,161,255,0.3);
  padding:8px 10px;
  font-size:11px;
  border-radius:10px;
  min-width:150px;
}

.vesselPopup b{
  color:#35d66b;
  font-size:12px;
}

.vesselPopup span{
  display:block;
  font-size:10px;
  color:#a9bad2;
}

.mapStats{
  position:absolute;
  bottom:10px;
  left:10px;
  right:10px;
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:6px;
  background:rgba(8,24,52,0.9);
  padding:6px;
  border-radius:10px;
  font-size:10px;
}

.mapStats div{
  text-align:center;
}

@media(max-width:600px){
  .mapStats{
    grid-template-columns:repeat(2,1fr);
    font-size:9px;
  }
}
</style>

</head>

<body>

<div class="productionMap">

  <div class="vesselPopup" style="top:50%;left:50%;">
    <b>VESSEL</b>
    <span>LIVE POSITION</span>
  </div>

  <div class="mapStats">
    <div>LAT<br>0.0000</div>
    <div>LNG<br>0.0000</div>
    <div>SPEED<br>0.0 KN</div>
    <div>STATUS<br>ONLINE</div>
  </div>

</div>

</body>
</html>
